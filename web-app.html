<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shams al-Asrar Web App</title>
  <style>
    :root {
      --bg: #030e10;
      --surface: #0a1a1d;
      --surface-elevated: #11272b;
      --border: #1c3a3f;
      --border-accent: #14d4c4;
      --primary: #0fa89a;
      --accent: #14d4c4;
      --amber: #e8b547;
      --positive: #22c77b;
      --negative: #e5484d;
      --caution: #f5a524;
      --text: #e6fbf8;
      --text-muted: #8fb5b0;
      --text-faint: #4d7370;
      --text-on-primary: #03171a;
      --chat-shams-bg: rgba(15, 168, 154, 0.1);
      --chat-shams-border: #14d4c4;
      --chat-user-bg: rgba(232, 181, 71, 0.1);
      --chat-user-border: #e8b547;
      --starfield: #a0f2ea;
      --nebula-1: rgba(20, 212, 196, 0.18);
      --nebula-2: rgba(15, 168, 154, 0.14);
      --nebula-3: rgba(232, 181, 71, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Cormorant Garamond", Georgia, serif;
    }

    body.rtl {
      direction: rtl;
    }

    h1, h2, h3, h4 {
      margin: 0;
      font-family: "Cinzel", "Times New Roman", serif;
      letter-spacing: 0.03em;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    #root {
      width: 100%;
      height: 100%;
    }

    .app-shell {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(1200px 800px at 15% 15%, var(--nebula-1), transparent 60%),
        radial-gradient(1000px 700px at 85% 20%, var(--nebula-2), transparent 65%),
        radial-gradient(900px 600px at 50% 95%, var(--nebula-3), transparent 65%),
        var(--bg);
    }

    .starfield::before,
    .starfield::after {
      content: "";
      position: absolute;
      inset: -25%;
      pointer-events: none;
      background:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,0.65) 0 1px, transparent 1.2px),
        radial-gradient(circle at 30% 70%, rgba(255,255,255,0.45) 0 1px, transparent 1.2px),
        radial-gradient(circle at 65% 35%, rgba(255,255,255,0.5) 0 1px, transparent 1.2px),
        radial-gradient(circle at 80% 85%, rgba(255,255,255,0.4) 0 1px, transparent 1.2px),
        radial-gradient(circle at 50% 10%, rgba(255,255,255,0.35) 0 1px, transparent 1.2px);
      background-size: 240px 240px;
      opacity: 0.35;
      animation: drift 90s linear infinite;
    }

    .starfield::after {
      animation-duration: 140s;
      opacity: 0.22;
      transform: scale(1.2);
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-160px, -120px, 0); }
    }

    .center-screen {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      padding: 24px;
      text-align: center;
    }

    .splash-wrap {
      max-width: 560px;
      display: grid;
      justify-items: center;
      gap: 18px;
    }

    .mandala {
      position: relative;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
      display: grid;
      place-items: center;
    }

    .mandala::before,
    .mandala::after {
      content: "";
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--amber) 45%, transparent);
      animation: spin 42s linear infinite;
    }

    .mandala::after {
      inset: 52px;
      border-color: color-mix(in srgb, var(--accent) 60%, transparent);
      animation-direction: reverse;
      animation-duration: 28s;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .sun-core {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff8cf, var(--amber));
      box-shadow: 0 0 24px color-mix(in srgb, var(--amber) 55%, transparent);
    }

    .title-xl {
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 1.12;
      color: var(--text);
    }

    .title-md {
      font-size: clamp(1.1rem, 2.8vw, 1.4rem);
      color: var(--accent);
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .muted {
      color: var(--text-muted);
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.45;
    }

    .faint {
      color: var(--text-faint);
      margin: 0;
      line-height: 1.45;
    }

    .permission-card {
      width: min(620px, 100%);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      text-align: left;
      display: grid;
      gap: 14px;
    }

    body.rtl .permission-card {
      text-align: right;
    }

    .cta-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface-elevated);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: 140ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
    }

    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--text-on-primary);
      font-weight: 700;
    }

    .btn.ghost {
      background: transparent;
    }

    .main-layout {
      position: relative;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .header {
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      backdrop-filter: blur(8px);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .header h2 {
      font-size: 1.28rem;
    }

    .header-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface-elevated) 86%, transparent);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .pill.accent {
      border-color: var(--border-accent);
      color: var(--accent);
    }

    .screen {
      overflow: auto;
      padding: 14px 14px 18px;
    }

    .tabbar {
      border-top: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      min-height: 62px;
    }

    .tab-btn {
      background: transparent;
      border: 0;
      color: var(--text-muted);
      display: grid;
      place-items: center;
      gap: 2px;
      cursor: pointer;
      padding: 8px 4px;
      font-size: 0.8rem;
      letter-spacing: 0.03em;
    }

    .tab-btn.active {
      color: var(--accent);
    }

    .tab-icon {
      font-size: 1.15rem;
      line-height: 1;
    }

    .oracle-layout {
      height: 100%;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 10px;
    }

    .chat-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 100%;
    }

    .bubble-row {
      display: flex;
    }

    .bubble-row.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: min(92%, 780px);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble-row.shams .bubble {
      background: var(--chat-shams-bg);
      border-left: 3px solid var(--chat-shams-border);
    }

    .bubble-row.user .bubble {
      background: var(--chat-user-bg);
      border-right: 3px solid var(--chat-user-border);
    }

    .composer-wrap {
      border-top: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      padding: 8px;
      display: grid;
      gap: 8px;
      border-radius: 12px;
    }

    .chips {
      display: flex;
      gap: 6px;
      overflow: auto;
      padding-bottom: 2px;
    }

    .chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--text-muted);
      white-space: nowrap;
      cursor: pointer;
      background: transparent;
    }

    .chip:hover {
      border-color: color-mix(in srgb, var(--accent) 40%, var(--border));
      color: var(--text);
    }

    .composer-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .composer-input {
      min-height: 40px;
      max-height: 130px;
      resize: vertical;
      border: 1px solid var(--border);
      background: var(--surface-elevated);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
    }

    .composer-input::placeholder {
      color: var(--text-faint);
    }

    .verdict-card {
      margin-top: 10px;
      border: 1px solid var(--border-accent);
      border-radius: 10px;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      overflow: hidden;
    }

    .card-row {
      padding: 8px 10px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .card-row:first-child {
      border-top: 0;
    }

    .tag {
      font-size: 0.8rem;
      border-radius: 999px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .score-bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--surface-elevated);
    }

    .score-fill {
      height: 100%;
    }

    .houses {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .house-pill {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.8rem;
    }

    .history-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      display: grid;
      gap: 8px;
    }

    .history-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .history-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .history-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.6);
      padding: 16px;
    }

    .modal-card {
      width: min(900px, 100%);
      max-height: 86vh;
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .skyclock-wrap {
      display: grid;
      gap: 12px;
    }

    .sky-disk-stage {
      display: grid;
      place-items: center;
      padding: 8px 0;
    }

    .sky-disk {
      width: min(80vw, 360px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 233, 182, 0.18), transparent 36%),
        conic-gradient(
          from 0deg,
          color-mix(in srgb, var(--accent) 45%, transparent),
          color-mix(in srgb, var(--amber) 35%, transparent),
          color-mix(in srgb, var(--accent) 45%, transparent),
          color-mix(in srgb, var(--amber) 35%, transparent),
          color-mix(in srgb, var(--accent) 45%, transparent)
        );
      animation: spin-disk 60s linear infinite;
      box-shadow: 0 0 28px color-mix(in srgb, var(--amber) 20%, transparent);
      position: relative;
    }

    .sky-disk::before {
      content: "";
      position: absolute;
      inset: 13%;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--text-muted) 30%, transparent);
    }

    .sky-disk::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 16px;
      height: 16px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 18px color-mix(in srgb, var(--amber) 60%, transparent);
    }

    @keyframes spin-disk {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
    }

    .info-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: color-mix(in srgb, var(--surface) 90%, transparent);
    }

    .planet-table {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
      background: color-mix(in srgb, var(--surface) 90%, transparent);
    }

    .planet-table table {
      width: 100%;
      border-collapse: collapse;
      min-width: 480px;
    }

    .planet-table th,
    .planet-table td {
      border-bottom: 1px solid var(--border);
      padding: 7px 8px;
      text-align: left;
      font-size: 0.9rem;
    }

    body.rtl .planet-table th,
    body.rtl .planet-table td {
      text-align: right;
    }

    .settings-grid {
      display: grid;
      gap: 12px;
      max-width: 980px;
      margin: 0 auto;
    }

    .section {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
    }

    .swatch.active {
      border-color: #ffffff;
      box-shadow: 0 0 0 1px var(--border);
    }

    .lang-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .lang-chip {
      padding: 6px 11px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
    }

    .lang-chip.active {
      background: var(--accent);
      color: var(--text-on-primary);
      border-color: var(--accent);
    }

    .stats {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      background: color-mix(in srgb, var(--surface-elevated) 70%, transparent);
    }

    .empty-state {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 26px 12px;
      text-align: center;
      color: var(--text-muted);
    }

    .text-good { color: var(--positive); }
    .text-bad { color: var(--negative); }
    .text-warn { color: var(--caution); }

    .hidden {
      display: none !important;
    }

    @media (max-width: 760px) {
      .header h2 {
        font-size: 1.12rem;
      }
      .screen {
        padding: 10px;
      }
      .bubble {
        max-width: 96%;
      }
    }
  </style>
</head>

      function fnv1a(input) {
        let h = 0x811c9dc5;
        for (let i = 0; i < input.length; i += 1) {
          h ^= input.charCodeAt(i);
          h = Math.imul(h, 0x01000193) >>> 0;
        }
        return h >>> 0;
      }

      function hashHex(seed) {
        return fnv1a(seed).toString(16).padStart(8, "0");
      }

      function clamp(num, min, max) {
        return Math.max(min, Math.min(max, num));

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function renderBold(str) {
        return escapeHtml(str).replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      }

        const d = new Date(now);

      function detectQuestionType(question) {
        const normalized = question.toLowerCase().trim();
        const types = Object.keys(QUESTION_KEYWORDS);
        for (let i = 0; i < types.length; i += 1) {
          const qType = types[i];
          const keywords = QUESTION_KEYWORDS[qType];
          for (let j = 0; j < keywords.length; j += 1) {
            if (normalized.includes(keywords[j])) {
              return qType;
            }
          }
        }
        return "general";
      }

      function dayLordAt(moment) {
        const dayMap = ["Sun", "Moon", "Mars", "Mercury", "Jupiter", "Venus", "Saturn"];
        return dayMap[moment.getDay()];
      }

      function horaLordAt(moment) {
        const dayLord = dayLordAt(moment);
        const dayStartIndex = CHALDEAN.indexOf(dayLord);
        const hourIndex = moment.getHours();
        return CHALDEAN[(dayStartIndex + hourIndex) % CHALDEAN.length];
      }

      function minuteLordAt(moment) {
        const dayLord = dayLordAt(moment);
        const dayStartIndex = CHALDEAN.indexOf(dayLord);
        const minuteIndex = moment.getHours() * 60 + moment.getMinutes();
        return CHALDEAN[(dayStartIndex + minuteIndex) % CHALDEAN.length];
      }

      function houseFromSeed(seed, label) {
        return (fnv1a(seed + "::" + label) % 12) + 1;
      }

      function pickPlanet(seed, label) {
        return PLANETS[fnv1a(seed + "::" + label) % PLANETS.length];
      }

      function seedBool(seed, label, chancePercent) {
        return (fnv1a(seed + "::" + label) % 100) < chancePercent;
      }

      function verdictFromScore(score) {
        if (score >= 3) return "YES";
        if (score <= -2) return "NO";
        return "CONDITIONAL";
      }

      function verdictColor(verdict) {
        if (verdict === "YES") return "var(--positive)";
        if (verdict === "NO") return "var(--negative)";
        if (verdict === "CONDITIONAL" || verdict === "DELAYED") return "var(--caution)";
        return "var(--text-muted)";
      }

      function verdictClass(verdict) {
        if (verdict === "YES") return "text-good";
        if (verdict === "NO") return "text-bad";
        return "text-warn";
      }

      function daysToWindow(days) {
        if (days < 30) return { window: "days", range: { min: 1, max: Math.max(1, Math.ceil(days)) } };
        if (days < 90) return { window: "weeks", range: { min: 1, max: Math.max(1, Math.ceil(days / 7)) } };
        if (days < 730) return { window: "months", range: { min: 1, max: Math.max(1, Math.ceil(days / 30.44)) } };
        return { window: "years", range: { min: 1, max: Math.max(1, Math.ceil(days / 365.25)) } };
      }

      function generateReading(questionText) {
        const now = new Date();
        const createdAt = now.toISOString();
        const qType = detectQuestionType(questionText);
        const matrix = HOUSE_MATRIX[qType];
        const lat = state.lastLocation ? state.lastLocation.lat : null;
        const lon = state.lastLocation ? state.lastLocation.lon : null;
        const seed = [
          questionText,
          createdAt,
          String(lat),
          String(lon),
          state.lang,
          state.themeId
        ].join("|");

        if (lat === null || lon === null) {
          return {
            id: "r_" + hashHex(seed),
            question: questionText,
            questionLang: state.lang,
            category: qType,
            verdict: "UNCLEAR",
            createdAt,
            chartJson: { phase: "no-location", moment: createdAt },
            verdictJson: {
              verdict: "UNCLEAR",
              confidence: 0,
              reasoning: [],
              narration: {
                en: t("locationDenied"),
                ur: t("locationDenied"),
                hi: t("locationDenied")
              }
            }
          };
        }

        const moonSubLord = pickPlanet(seed, "moon-sub-lord");
        const moonSubLordHouse = houseFromSeed(seed, "moon-sub-lord-house");
        const dayLord = dayLordAt(now);
        const horaLord = horaLordAt(now);
        const minuteLord = minuteLordAt(now);

        let score = 0;
        const reasoning = [];

        reasoning.push({
          ruleId: "STEP_1",
          description: "[STEP 1] Moon sub-lord resolved as " + moonSubLord,
          weight: 0
        });
        reasoning.push({
          ruleId: "STEP_2",
          description: "[STEP 2] Question type: " + qType + " | favorable: [" + matrix.favorable.join(",") + "] denial: [" + matrix.denial.join(",") + "]",
          weight: 0
        });

        if (matrix.favorable.includes(moonSubLordHouse)) {
          score += 2;
          reasoning.push({
            ruleId: "STEP_3",
            description: "[STEP 3] Moon sub-lord occupies favorable house " + moonSubLordHouse,
            weight: 2
          });
        } else if (matrix.denial.includes(moonSubLordHouse)) {
          score -= 2;
          reasoning.push({
            ruleId: "STEP_3",
            description: "[STEP 3] Moon sub-lord occupies denial house " + moonSubLordHouse,
            weight: -2
          });
        } else {
          reasoning.push({
            ruleId: "STEP_3",
            description: "[STEP 3] Moon sub-lord occupies neutral house " + moonSubLordHouse,
            weight: 0
          });
        }

        const rpList = [
          { role: "dayLord", planet: dayLord },
          { role: "horaLord", planet: horaLord },
          { role: "minuteLord", planet: minuteLord }
        ];

        let rpScore = 0;
        for (let i = 0; i < rpList.length; i += 1) {
          const rp = rpList[i];
          const rpHouse = houseFromSeed(seed, rp.planet + "::rp-house");
          let contribution = 0;
          if (matrix.favorable.includes(rpHouse)) contribution = 1;
          else if (matrix.denial.includes(rpHouse)) contribution = -1;
          score += contribution;
          rpScore += contribution;
          reasoning.push({
            ruleId: "STEP_4",
            description: "[STEP 4] " + rp.role + " (" + rp.planet + ") in house " + rpHouse + " => " + (contribution > 0 ? "+1" : contribution < 0 ? "-1" : "0"),
            weight: contribution
          });
        }

        let verdict = verdictFromScore(score);
        const delayedByRetro =
          verdict === "YES" &&
          (seedBool(seed, moonSubLord + "-retro", 26) || seedBool(seed, "Jupiter-retro", 32) || seedBool(seed, "Venus-retro", 20));
        if (delayedByRetro) verdict = "DELAYED";

        reasoning.push({
          ruleId: "STEP_5",
          description: "[STEP 5] Total score = " + score + " => " + verdict,
          weight: score
        });

        const confidence = Math.round(clamp(((score + 5) / 10) * 100, 10, 100));
        const positiveScore = Math.max(0, score);
        const dashaYears = { Sun: 6, Moon: 10, Mars: 7, Mercury: 17, Jupiter: 16, Venus: 20, Saturn: 19, Rahu: 18, Ketu: 7 };
        const timingPlanet = pickPlanet(seed, "timing-planet");
        const timingDays = ((dashaYears[timingPlanet] || 7) * 12 * (positiveScore / 5 || 0.15)) * 30.44;
        const timingData = daysToWindow(Math.max(10, timingDays));

        const remedy = buildRemedy(moonSubLord);
        const favHits = matrix.favorable.filter((h) => h === moonSubLordHouse);
        const denHits = matrix.denial.filter((h) => h === moonSubLordHouse);
        const narrationEn = buildNarration(verdict, qType, moonSubLord, moonSubLordHouse, score);

        const reading = {
          id: "r_" + hashHex(seed + "_id"),
          question: questionText,
          questionLang: state.lang,
          category: qType,
          verdict,
          createdAt,
          chartJson: {
            momentUtc: createdAt,
            location: { lat, lon },
            rulingPlanets: rpList.map((p) => p.planet)
          },
          verdictJson: {
            verdict,
            confidence,
            reasoning,
            timing: {
              window: timingData.window,
              range: timingData.range,
              activeDasha: dayLord,
              activeAntardasha: horaLord,
              activePratyantardasha: minuteLord
            },
            remedy: remedy,
            narration: {
              en: narrationEn,
              ur: narrationEn,
              hi: narrationEn
            },
            moonSubLord: {
              planet: moonSubLord,
              occupiedHouse: moonSubLordHouse,
              favHits,
              denHits
            },
            rulingPlanets: {
              dayLord,
              horaLord,
              minuteLord,
              agreementScore: rpScore
            }
          }
        };

        return reading;
      }

      function buildNarration(verdict, qType, subLord, house, score) {
        if (verdict === "YES") {
          return "The heavens support your " + qType + " matter. Moon sub-lord " + subLord + " in house " + house + " gives a favorable signal. Score: +" + score + ".";
        }
        if (verdict === "NO") {
          return "The present planetary testimony does not support your " + qType + " matter. Moon sub-lord " + subLord + " weighs toward denial. Score: " + score + ".";
        }
        if (verdict === "DELAYED") {
          return "Your " + qType + " matter is positive but delayed. The signal is favorable, yet timing stretches due to retrograde pressure.";
        }
        if (verdict === "CONDITIONAL") {
          return "Your " + qType + " question shows mixed signals. Progress is possible with conditions and corrective steps. Score: " + score + ".";
        }
        return "The chart is unclear for this question right now.";
      }

      function detectIntent(text) {
        const q = text.toLowerCase();

        if (q.includes("remedy") || q.includes("upay") || q.includes("tadbeer") || q.includes("mantra")) return "remedy";

      function relativeTime(iso) {
        const ts = Date.parse(iso);
        if (Number.isNaN(ts)) return "";
        const diffSec = Math.max(0, Math.floor((Date.now() - ts) / 1000));
        if (diffSec < 60) return "just now";
        if (diffSec < 3600) return Math.floor(diffSec / 60) + "m";
        if (diffSec < 86400) return Math.floor(diffSec / 3600) + "h";
        if (diffSec < 86400 * 7) return Math.floor(diffSec / 86400) + "d";
        return new Date(ts).toLocaleDateString();
      }

      function moonPhaseInfo(nowMs) {
        const jd = nowMs / 86400000 + 2440587.5;
        const cycle = ((jd - 2451550.1) / 29.53058867) % 1;
        const p = cycle < 0 ? cycle + 1 : cycle;
        const icons = ["🌑", "🌒", "🌓", "🌔", "🌕", "🌖", "🌗", "🌘"];
        const names = ["New Moon", "Waxing Crescent", "First Quarter", "Waxing Gibbous", "Full Moon", "Waning Gibbous", "Last Quarter", "Waning Crescent"];
        const idx = Math.round(p * 8) % 8;
        return { icon: icons[idx], name: names[idx] };
      }

      function localSiderealTime(nowMs, lonDeg) {
        const JD_J2000 = 2451545.0;
        const jd = nowMs / 86400000 + 2440587.5;
        const T = (jd - JD_J2000) / 36525;
        const gmst = 280.46061837 + 360.98564736629 * (jd - JD_J2000) + 0.000387933 * T * T;
        const lmst = (((gmst + lonDeg) % 360) + 360) % 360;
        const h = Math.floor(lmst / 15);
        const m = Math.floor(((lmst / 15) - h) * 60);
        return String(h).padStart(2, "0") + "h " + String(m).padStart(2, "0") + "m";
      }

      function ascendantSignApprox(nowMs, lonDeg, latDeg) {
        const JD_J2000 = 2451545.0;
        const jd = nowMs / 86400000 + 2440587.5;
        const T = (jd - JD_J2000) / 36525;
        const gmst = 280.46061837 + 360.98564736629 * (jd - JD_J2000) + 0.000387933 * T * T;
        const ramc = (((gmst + lonDeg) % 360) + 360) % 360;
        const eps = 23.4393 - 0.013 * T;
        const ramcR = ramc * (Math.PI / 180);
        const epsR = eps * (Math.PI / 180);
        const latR = latDeg * (Math.PI / 180);
        const t2 = -Math.cos(ramcR) / (Math.sin(epsR) * Math.tan(latR) + Math.cos(epsR) * Math.sin(ramcR));
        let asc = Math.atan(t2) * (180 / Math.PI);
        if (Math.cos(ramcR) > 0) asc += 180;
        asc = ((asc % 360) + 360) % 360;
        const LAHIRI = 24.12;
        const sidAsc = (((asc - LAHIRI) % 360) + 360) % 360;
        const signIdx = Math.floor(sidAsc / 30);
        return SIGN_NAMES[signIdx];
      }

      function moonSignApprox(nowMs) {
        const JD_J2000 = 2451545.0;
        const jd = nowMs / 86400000 + 2440587.5;
        const T = (jd - JD_J2000) / 36525;
        const moonLon = (((218.3165 + 481267.8813 * T) % 360) + 360) % 360;
        const LAHIRI = 24.12;
        const sid = (((moonLon - LAHIRI) % 360) + 360) % 360;
        const idx = Math.floor(sid / 30);
        return SIGN_NAMES[idx];
      }

      function displayPlanetLongitude(name, nowMs) {
        const JD_J2000 = 2451545.0;
        const jd = nowMs / 86400000 + 2440587.5;
        const T = (jd - JD_J2000) / 36525;
        const elems = {
          Sun: { L0: 280.46646, Lr: 36000.76983 },
          Moon: { L0: 218.3165, Lr: 481267.8813 },
          Mercury: { L0: 252.2509, Lr: 149472.6749 },
          Venus: { L0: 181.9798, Lr: 58517.8156 },
          Mars: { L0: 355.4330, Lr: 19140.2993 },
          Jupiter: { L0: 34.3515, Lr: 3034.9057 },
          Saturn: { L0: 50.0774, Lr: 1222.1138 },
          Rahu: { L0: 125.0445, Lr: -1934.136 }
        };
        const e = elems[name];
        const tropical = (((e.L0 + e.Lr * T) % 360) + 360) % 360;
        const LAHIRI = 24.12;
        return (((tropical - LAHIRI) % 360) + 360) % 360;
      }

      function formatDms(lon) {
        const degInSign = lon % 30;

        const m = Math.floor((degInSign - d) * 60);

      }

            '<section class="section">' +
              "<h3>" + escapeHtml(t("stats")) + "</h3>" +
              '<div class="stats">' +
                '<div class="stat"><div style="font-weight:700; color:var(--accent);">' + total + '</div><div class="faint">Total</div></div>' +
                '<div class="stat"><div style="font-weight:700; color:var(--positive);">' + yes + '</div><div class="faint">YES</div></div>' +
                '<div class="stat"><div style="font-weight:700; color:var(--negative);">' + no + '</div><div class="faint">NO</div></div>' +
                '<div class="stat"><div style="font-weight:700; color:var(--caution);">' + cond + '</div><div class="faint">COND</div></div>' +
              "</div>" +
            "</section>" +
            '<section class="section">' +
              "<h3>" + escapeHtml(t("location")) + "</h3>" +
              "<div>" + escapeHtml(locationText) + "</div>" +
              '<div class="history-actions">' +
                '<button class="btn" data-action="refresh-location">' + escapeHtml(t("refreshLocation")) + "</button>" +
              "</div>" +
            "</section>" +
            '<section class="section">' +
              '<div class="history-actions">' +
                '<button class="btn ghost" data-action="clear-history">' + escapeHtml(t("clearHistory")) + "</button>" +
              "</div>" +
            "</section>" +
          "</div>"
        );
      }

      function renderPermission() {
        return (
          '<div class="app-shell starfield">' +
            '<div class="center-screen">' +
              '<div class="permission-card">' +
                "<h2>" + escapeHtml(t("permissionTitle")) + "</h2>" +
                "<p class='muted'>" + escapeHtml(t("permissionBody")) + "</p>" +
                '<p class="faint">' + escapeHtml(t("locationDenied")) + "</p>" +
                '<div class="cta-row">' +
                  '<button class="btn primary" data-action="grant-location">' + escapeHtml(t("grantAccess")) + "</button>" +
                  '<button class="btn ghost" data-action="skip-location">' + escapeHtml(t("notNow")) + "</button>" +
                "</div>" +
              "</div>" +
            "</div>" +
          "</div>"
        );
      }

      function renderSplash() {
        return (
          '<div class="app-shell starfield">' +
            '<div class="center-screen">' +
              '<div class="splash-wrap">' +
                '<div class="mandala"><div class="sun-core"></div></div>' +
                '<h1 class="title-xl">' + escapeHtml(t("appName")) + "</h1>" +
                '<div class="title-md">' + escapeHtml(t("tagline")) + "</div>" +
                '<p class="muted">' + escapeHtml(t("poweredBy")) + "</p>" +
                '<p class="faint">' + escapeHtml(t("splash")) + "</p>" +
              "</div>" +
            "</div>" +
          "</div>"
        );
      }

      function renderMain() {
        let screenHtml = "";
        if (state.activeTab === "Oracle") screenHtml = renderOracle();
        if (state.activeTab === "SkyClock") screenHtml = renderSkyClock();
        if (state.activeTab === "History") screenHtml = renderHistory();
        if (state.activeTab === "Settings") screenHtml = renderSettings();

        return (
          '<div class="app-shell starfield">' +
            '<div class="main-layout">' +
              renderHeader() +
              '<main class="screen">' + screenHtml + "</main>" +
              renderTabbar() +
            "</div>" +
            renderHistoryModal() +
          "</div>"
        );
      }

      function render() {
        document.body.classList.toggle("rtl", isRtl());
        applyTheme();
        if (ui.phase === "splash") {
          root.innerHTML = renderSplash();
          return;
        }
        if (!state.onboardingPrompted) {
          root.innerHTML = renderPermission();
          return;
        }
        root.innerHTML = renderMain();
        if (state.activeTab === "Oracle") {
          const list = document.getElementById("chat-list");
          if (list) list.scrollTop = list.scrollHeight;
        }
      }

      function requestLocation(callback) {
        if (!navigator.geolocation) {
          callback(false, "Geolocation is not supported in this browser.");
          return;
        }
        navigator.geolocation.getCurrentPosition(
          function (pos) {
            state.lastLocation = {
              lat: pos.coords.latitude,
              lon: pos.coords.longitude,
              label: null,
              capturedAt: Date.now()
            };
            state.onboardingPermissionGranted = true;
            saveState();
            callback(true);
          },
          function () {
            state.onboardingPermissionGranted = false;
            saveState();
            callback(false, t("locationDenied"));
          },
          { enableHighAccuracy: true, timeout: 9000, maximumAge: 30000 }
        );
      }

      function sendOracleMessage(textRaw) {
        const text = textRaw.trim();
        if (!text || ui.sending) return;

        const nowIso = new Date().toISOString();
        ui.messages.push({ id: "u_" + Date.now(), sender: "user", text: text, createdAt: nowIso });

        if (ui.chatStage === "answered" && ui.lastReadingId) {
          const lastReading = readingById(ui.lastReadingId);
          if (lastReading) {
            const intent = detectIntent(text);
            if (intent !== "new" && intent !== "none") {
              let reply = "";
              const v = lastReading.verdictJson || {};
              if (intent === "timing") {
                if (v.timing) {
                  reply = "Movement is expected within **" + Number(v.timing.range.max || 1) + " " + String(v.timing.window || "weeks") + "**.\n\nActive: **" + String(v.timing.activeDasha || "-") + "** / **" + String(v.timing.activeAntardasha || "-") + "**.";
                } else {
                  reply = "Timing data is not available for this reading.";
                }
              } else if (intent === "why") {
                const msl = v.moonSubLord || {};
                reply = "The verdict leans on **Moon Sub-Lord " + String(msl.planet || "-") + "** in house **" + Number(msl.occupiedHouse || 0) + "**.\n\nConfidence: **" + Number(v.confidence || 0) + "%**.";
              } else if (intent === "remedy") {
                if (v.remedy) {
                  reply = "Remedy for **" + String(v.remedy.planet || "") + "**:\n\n• " + String(v.remedy.action || "") + "\n• Avoid: " + String(v.remedy.avoid || "");
                  if (v.remedy.mantra) reply += "\n• Mantra: *" + String(v.remedy.mantra) + "*";
                } else {
                  reply = "No specific remedy found for this reading.";
                }
              }
              ui.messages.push({ id: "s_fu_" + Date.now(), sender: "shams", text: reply, createdAt: new Date().toISOString() });
              render();
              return;
            }
            if (intent === "new") {
              ui.chatStage = "ready";
              ui.lastReadingId = null;
            }
          }
        }

        if (!canAsk()) {
          ui.messages.push({ id: "quota_" + Date.now(), sender: "shams", text: t("quotaExhausted"), createdAt: new Date().toISOString() });
          render();
          return;
        }

        ui.sending = true;
        render();

        setTimeout(function () {
          const consumed = consumeQuota();
          if (!consumed) {
            ui.messages.push({ id: "quota_" + Date.now(), sender: "shams", text: t("quotaExhausted"), createdAt: new Date().toISOString() });
            ui.sending = false;
            render();
            return;
          }

          const reading = generateReading(text);
          addReading(reading);
          ui.lastReadingId = reading.id;
          ui.chatStage = "answered";
          const narration = (reading.verdictJson && reading.verdictJson.narration && (reading.verdictJson.narration[reading.questionLang] || reading.verdictJson.narration.en)) || "Judgment complete.";
          ui.messages.push({ id: "s_" + reading.id, sender: "shams", text: narration, reading: reading, createdAt: new Date().toISOString() });
          ui.sending = false;
          render();
        }, 520);
      }

      function handleAction(action, dataset, eventTarget) {
        if (action === "switch-tab") {
          state.activeTab = dataset.tab;
          ui.selectedReadingId = null;
          state.activeTab = dataset.tab;
          saveState();
          render();
          return;
        }

        if (action === "grant-location") {
          requestLocation(function (ok, errorText) {
            state.onboardingPrompted = true;
            saveState();
            if (!ok && errorText) {
              alert(errorText);
            }
            render();
          });
          return;
        }

        if (action === "skip-location") {
          state.onboardingPrompted = true;
          state.onboardingPermissionGranted = false;
          saveState();
          render();
          return;
        }

        if (action === "chip") {
          sendOracleMessage(dataset.chip || "");
          return;
        }

        if (action === "open-reading") {
          ui.selectedReadingId = dataset.id;
          render();
          return;
        }

        if (action === "delete-reading") {
          if (confirm("Delete this reading?")) {
            removeReading(dataset.id);
            saveState();
            render();
          }
          return;
        }

        if (action === "close-modal" || action === "close-modal-bg") {
          if (action === "close-modal-bg" && eventTarget && !eventTarget.classList.contains("history-modal")) {
            return;
          }
          ui.selectedReadingId = null;
          render();
          return;
        }

        if (action === "set-filter") {
          state.filter = dataset.filter;
          saveState();
          render();
          return;
        }

        if (action === "toggle-sort") {
          state.sort = state.sort === "newest" ? "oldest" : "newest";
          saveState();
          render();
          return;
        }

        if (action === "set-theme") {
          if (THEMES[dataset.theme]) {
            state.themeId = dataset.theme;
            saveState();
            render();
          }
          return;
        }

        if (action === "set-lang") {
          if (STRINGS[dataset.lang]) {
            state.lang = dataset.lang;
            normalizeMessagesAfterLanguageChange();
            saveState();
            render();
          }
          return;
        }

        if (action === "refresh-location") {
          requestLocation(function (ok, errorText) {
            if (!ok && errorText) alert(errorText);
            saveState();
            render();
          });
          return;
        }

        if (action === "clear-history") {
          if (confirm("Clear all readings?")) {
            state.readings = [];
            ui.lastReadingId = null;
            ui.chatStage = "ready";
            saveState();
            render();
          }
          return;
        }

        if (action === "save-wallpaper") {
          alert("Take a screenshot to save your Sky Clock wallpaper.");
          return;
        }
      }

      document.addEventListener("click", function (event) {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        const action = target.getAttribute("data-action");
        if (!action) return;
        handleAction(action, target.dataset, target);
      });

      document.addEventListener("submit", function (event) {
        const form = event.target.closest("form[data-action='send-message']");
        if (!form) return;
        event.preventDefault();
        const input = document.getElementById("oracle-input");
        if (!input) return;
        const text = input.value || "";
        if (!text.trim()) return;
        input.value = "";
        sendOracleMessage(text);
      });

      setTimeout(function () {
        ui.phase = "app";
        render();
      }, 2500);

      setInterval(function () {
        if (ui.phase === "app" && state.activeTab === "SkyClock") {
          render();
        }
      }, 1000);

      render();
    })();
  </script>
</body>
</html>
