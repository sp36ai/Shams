appId: com.shamsalasrar
name: "Onboarding — 3-question seeker profile"
---
# Assumes user is already authenticated (run after sign-up or use a seeded account)
# and onboarding has NOT been completed yet.

- launchApp

- waitForAnimationToEnd:
    timeout: 4000

# Location permission screen — tap Allow
- runFlow:
    when:
      visible: "Allow access to your location"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd

# Onboarding — Question 1
- assertVisible: "QUESTION ONE — INTENT"
- assertVisible: "What brings you to the oracle?"
- tapOn: "I face a decision and need clarity"

# Should advance to Question 2
- assertVisible: "QUESTION TWO — REGISTER"
- tapOn: "Directly — I want clear answers"

# Should advance to Question 3
- assertVisible: "QUESTION THREE — TIMING"
- tapOn: "Before important choices"

# Haiku inference — wait up to 10s
- waitForAnimationToEnd:
    timeout: 10000

# CTA should appear after inference completes
- assertVisible:
    id: "onboarding-enter-btn"
- tapOn:
    id: "onboarding-enter-btn"

# Should land on OracleScreen
- assertVisible: "SHAMS AL-ASRĀR"
- assertVisible:
    id: "oracle-input"
