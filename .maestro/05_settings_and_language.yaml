appId: com.astrosarfaraz.shamsalasrar
name: "Settings — language switch and sign out"
---
- launchApp

- waitForAnimationToEnd:
    timeout: 4000

# Navigate to Settings tab
- tapOn: "Settings"

# Settings screen header
- assertVisible: "AL-DAFTAR"

# Plan display
- assertVisible: "Free"

# Switch to Urdu
- tapOn: "اردو"
- waitForAnimationToEnd

# Switch back to English
- tapOn: "English"
- waitForAnimationToEnd

# Sign out flow
- tapOn: "Sign Out"
- assertVisible: "Sign out of Shams al-Asrar?"
- tapOn: "Cancel"

# Should still be on Settings
- assertVisible: "AL-DAFTAR"
