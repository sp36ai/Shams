appId: com.astrosarfaraz.shamsalasrar
name: "Auth — Sign In flow"
---
- launchApp:
    clearState: true

# Splash clears after 2.5s + Firebase auth bootstrap
- extendedWaitUntil:
    visible:
      id: "auth-tab-signin"
    timeout: 20000
- assertVisible: "SHAMS AL-ASRĀR"

# Switch to sign-up and back
- tapOn:
    id: "auth-tab-signup"
- assertVisible: "Full name"
- tapOn:
    id: "auth-tab-signin"
- assertNotVisible: "Full name"

# Validation — empty submit
- tapOn:
    id: "auth-submit-btn"
- assertVisible: "Enter a valid email address"

# Validation — weak password
- tapOn:
    id: "auth-input-email"
- inputText: "test@example.com"
- tapOn:
    id: "auth-input-password"
- inputText: "short"
- hideKeyboard
- tapOn:
    id: "auth-submit-btn"
- assertVisible: "Password must be at least 8 characters"
