appId: com.astrosarfaraz.shamsalasrar
name: "Settings — plan display and sign out"
---
# Runs after 02_signup_journey: reuses its signed-in session state.

- launchApp

# Splash + session restore for the account created in 02
- extendedWaitUntil:
    visible: "Settings"
    timeout: 20000

# Navigate to Settings tab
- tapOn: "Settings"
- assertVisible: "AL-DAFTAR"

# Free plan shown for the fresh account
- assertVisible: "Free"

# Sign out — cancel first, then confirm
- tapOn: "Sign Out"
- assertVisible: "Sign out of Shams al-Asrar?"
- tapOn: "Cancel"
- assertVisible: "AL-DAFTAR"

- tapOn: "Sign Out"
- assertVisible: "Sign out of Shams al-Asrar?"
- tapOn:
    text: "Sign Out"
    index: 1

# Back at the Auth gate
- extendedWaitUntil:
    visible:
      id: "auth-tab-signin"
    timeout: 10000
