name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app-quality:
    name: App Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --runInBand

      - name: Dead code guard (orphans)
        run: npm run check:orphans

  functions-quality:
    name: Functions Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --run

  e2e:
    name: E2E Tests (Maestro)
    runs-on: ubuntu-latest
    needs: app-quality
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Use real google-services.json from secret if available,
      # otherwise fall back to the CI mock (structure-valid, placeholder creds).
      # The mock allows Gradle to compile; Firebase calls will fail at runtime
      # which is acceptable — E2E flows test UI logic, not live Firebase.
      - name: Write google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json
            echo "Using real google-services.json from secret"
          else
            cp android/app/google-services.json.ci android/app/google-services.json
            echo "Using CI mock google-services.json (no secret configured)"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon -q

      - name: Enable KVM (emulator acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_6
          avd-name: shams_test
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # NOTE: the runner executes each script line in a separate shell, so
          # env exports do not persist between lines — keep commands self-contained.
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            curl -Ls "https://get.maestro.mobile.dev" | MAESTRO_VERSION=1.39.0 bash
            "$HOME/.maestro/bin/maestro" test --format junit --output maestro-results.xml .maestro/ || true

      - name: Upload Maestro results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results
          path: |
            maestro-results.xml
            ~/.maestro/tests/

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maestro E2E Results
          path: maestro-results.xml
          reporter: java-junit
          fail-on-error: false
