name: Deploy Cloud Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'src/astrology/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to asia-south1
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Build
        run: npm run build
        working-directory: functions
      - name: Write service account key
                run: echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}' | base64 -d > /tmp/sa-key.json
      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only functions --project shams-app-4d0e7 --force
        env:
                  GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json

      - name: Health check
        run: |
          curl --fail --silent --show-error --max-time 30 \
            https://asia-south1-shams-app-4d0e7.cloudfunctions.net/health
