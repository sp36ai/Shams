name: Firestore Rules Testing

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.rules.test.ts"
      - "firebase.test.json"
      - "package.json"
      - ".github/workflows/firestore-rules-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.rules.test.ts"
      - "firebase.test.json"
      - "package.json"
      - ".github/workflows/firestore-rules-tests.yml"
  workflow_dispatch:

jobs:
  rules-validation:
    name: Validate Security Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java (required for Firebase Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Verify test files and config
        run: |
          echo "Checking firestore.rules file..."
          ls -la firestore.rules
          echo "Checking firestore.rules.test.ts file..."
          ls -la firestore.rules.test.ts
          echo "Checking firebase.test.json..."
          file firebase.test.json
          echo "First 10 bytes of firebase.test.json (hex):"
          hexdump -C firebase.test.json | head -2
          echo "firebase.test.json content:"
          cat firebase.test.json
          echo "Checking firebase CLI..."
          npx firebase --version
          echo "Checking if files are readable..."
          test -r firestore.rules && echo "✓ firestore.rules is readable" || echo "✗ firestore.rules is NOT readable"
          test -r firestore.rules.test.ts && echo "✓ firestore.rules.test.ts is readable" || echo "✗ firestore.rules.test.ts is NOT readable"
          test -r firebase.test.json && echo "✓ firebase.test.json is readable" || echo "✗ firebase.test.json is NOT readable"

      - name: Run Firestore Rules Unit Tests
        run: npm run test:rules 2>&1 | tee test-output.log || TEST_FAILED=1

      - name: Show test output if failed
        if: failure()
        run: |
          echo "=== Full test output ==="
          cat test-output.log || echo "No test output file found"
          echo ""
          echo "=== Environment info ==="
          env | grep -i firebase || echo "No firebase env vars"
          echo ""
          echo "=== Node/NPM versions ==="
          node --version
          npm --version
