name: Firestore Rules Testing

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.rules.test.ts"
      - "firebase.test.json"
      - "package.json"
      - ".github/workflows/firestore-rules-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.rules.test.ts"
      - "firebase.test.json"
      - "package.json"
      - ".github/workflows/firestore-rules-tests.yml"
  workflow_dispatch:

jobs:
  rules-validation:
    name: Validate Security Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Validate Firestore Rules Syntax
        run: |
          echo "Validating firestore.rules file..."

          # Check file exists
          if [ ! -f firestore.rules ]; then
            echo "✗ firestore.rules file not found"
            exit 1
          fi
          echo "✓ firestore.rules file exists"

          # Check basic syntax
          if grep -q "rules_version = '2'" firestore.rules; then
            echo "✓ Has rules_version = '2'"
          else
            echo "✗ Missing or incorrect rules_version"
            exit 1
          fi

          if grep -q "service cloud.firestore" firestore.rules; then
            echo "✓ Has service cloud.firestore"
          else
            echo "✗ Missing service cloud.firestore"
            exit 1
          fi

          if grep -q "match /databases/{database}/documents" firestore.rules; then
            echo "✓ Has database documents matcher"
          else
            echo "✗ Missing database documents matcher"
            exit 1
          fi

          # Check for mismatched braces
          open_braces=$(grep -o '{' firestore.rules | wc -l)
          close_braces=$(grep -o '}' firestore.rules | wc -l)
          if [ "$open_braces" -eq "$close_braces" ]; then
            echo "✓ Brace count balanced ($open_braces opening, $close_braces closing)"
          else
            echo "✗ Mismatched braces ($open_braces opening, $close_braces closing)"
            exit 1
          fi

          echo ""
          echo "✅ Firestore rules validation passed"
