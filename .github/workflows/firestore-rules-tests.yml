name: Firestore Rules Testing

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.rules.test.ts"
      - "firebase.test.json"
      - "package.json"
      - ".github/workflows/firestore-rules-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.rules.test.ts"
      - "firebase.test.json"
      - "package.json"
      - ".github/workflows/firestore-rules-tests.yml"
  workflow_dispatch:

jobs:
  rules-validation:
    name: Validate Security Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java (required for Firebase Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Verify test files and config
        run: |
          echo "Checking firestore.rules file..."
          ls -la firestore.rules
          echo "Checking firestore.rules.test.ts file..."
          ls -la firestore.rules.test.ts
          echo "Checking firebase.test.json..."
          file firebase.test.json
          echo "firebase.test.json content:"
          cat firebase.test.json
          echo ""
          echo "Checking firebase CLI..."
          npx firebase --version
          echo ""
          echo "Checking if files are readable..."
          test -r firestore.rules && echo "✓ firestore.rules is readable" || echo "✗ firestore.rules is NOT readable"
          test -r firestore.rules.test.ts && echo "✓ firestore.rules.test.ts is readable" || echo "✗ firestore.rules.test.ts is NOT readable"
          test -r firebase.test.json && echo "✓ firebase.test.json is readable" || echo "✗ firebase.test.json is NOT readable"

      - name: Validate Firestore Rules Syntax
        run: |
          echo "Validating firestore.rules syntax..."
          if grep -q "rules_version = '2'" firestore.rules && \
             grep -q "service cloud.firestore" firestore.rules && \
             grep -q "match /databases/{database}/documents" firestore.rules; then
            echo "✓ Firestore rules file has valid basic structure"
          else
            echo "✗ Firestore rules file structure is invalid"
            exit 1
          fi

      - name: Run Firestore Rules Unit Tests (BETA - non-blocking)
        continue-on-error: true
        run: |
          echo "Starting firestore rules emulator tests..."
          echo "Node version:" $(node --version)
          echo "npm version:" $(npm --version)
          echo "Java version:" $(java -version 2>&1 || echo "Java not found")
          echo ""
          npm run test:rules 2>&1
          echo ""
          echo "Note: Emulator tests are in BETA. Failures here do not block the PR."
