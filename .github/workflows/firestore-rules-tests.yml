name: Firestore Rules Testing

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.rules.test.ts"
      - "firebase.test.json"
      - "package.json"
      - ".github/workflows/firestore-rules-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.rules.test.ts"
      - "firebase.test.json"
      - "package.json"
      - ".github/workflows/firestore-rules-tests.yml"
  workflow_dispatch:

jobs:
  rules-validation:
    name: Validate Security Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java (required for Firebase Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Verify test files and config
        run: |
          echo "Checking firestore.rules file..."
          ls -la firestore.rules
          echo "Checking firestore.rules.test.ts file..."
          ls -la firestore.rules.test.ts
          echo "Checking firebase.test.json..."
          cat firebase.test.json
          echo "Checking firebase CLI..."
          npx firebase --version

      - name: Run Firestore Rules Unit Tests
        run: npm run test:rules
