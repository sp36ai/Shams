name: Export upload key certificate

# One-off helper for the Play App Signing upload-key reset.
# Exports the PUBLIC certificate (PEM) of the keystore stored in the
# SHAMS_UPLOAD_KEYSTORE secret so it can be submitted to Play Console.
# The private key never leaves the runner. Delete this workflow once
# the reset is approved.

on:
  push:
    branches: [claude/modest-shannon-ugsimx]
    paths: ['.github/workflows/export-upload-cert.yml']

jobs:
  export-cert:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Export certificate
        run: |
          echo "${{ secrets.SHAMS_UPLOAD_KEYSTORE }}" | base64 -d > shams-upload-key.jks
          keytool -export -rfc \
            -keystore shams-upload-key.jks \
            -alias "${{ secrets.SHAMS_UPLOAD_KEY_ALIAS }}" \
            -storepass "${{ secrets.SHAMS_UPLOAD_STORE_PASSWORD }}" \
            -file upload_certificate.pem
          rm -f shams-upload-key.jks
          echo "===== SHA1 fingerprint (must end 5C:34) ====="
          keytool -printcert -file upload_certificate.pem | grep SHA1
          echo "===== upload_certificate.pem ====="
          cat upload_certificate.pem

      - name: Upload certificate artifact
        uses: actions/upload-artifact@v4
        with:
          name: upload_certificate
          path: upload_certificate.pem
          retention-days: 7
